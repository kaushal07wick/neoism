name: Test

# Per-push CI is Linux-only: Windows minutes bill 2x and macOS 10x on the
# private repo, and running them on every push drained the Actions quota
# (which blocked a release build entirely). Run the full cross-platform
# matrix on demand via workflow_dispatch.
on:
  push:
    paths:
      - '**/*.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - '**/*.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/test.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

jobs:
  test-native:
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event_name == 'workflow_dispatch' && fromJSON('["windows-latest", "macos-latest", "ubuntu-latest"]') || fromJSON('["ubuntu-latest"]') }}

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3
      - uses: Swatinem/rust-cache@v2
      - run: rustup toolchain install stable --profile minimal
      - run: rustup component add rustfmt clippy
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update -yq && sudo apt-get install -yq libasound2-dev libfontconfig1-dev glslang-tools
      - run: cargo fetch
      - run: cargo fmt -- --check --color always
      - run: cargo clippy --all-targets --all-features
      - name: Check Windows terminal/daemon packages
        if: runner.os == 'Windows'
        run: cargo check -p teletypewriter -p neoism-terminal-pty -p neoism-workspace-daemon -p neoism --features wgpu
      - run: cargo test --release --features wgpu
      - name: Guard against UI code leaking into the desktop fork
        if: runner.os != 'Windows'
        shell: bash
        run: ./scripts/check_no_ui_in_desktop_fork.sh
  msys2-build-test: #cargo test doesn't necessarily build the exec we want
    if: github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        sys: [MINGW64, UCRT64, CLANG64]
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ matrix.sys }}
        update: true
        install: base-devel git
        pacboy: >-
          rust:p
          cc:p
          pkgconf:p
          cmake:p
          freetype:p
          python:p
          fontconfig:p

    - name: Run cargo
      shell: msys2 {0}
      run: cargo build --release --features wgpu

