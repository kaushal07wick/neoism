<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>neoism-terminal-wasm smoke</title>
<style>
  body { font-family: ui-monospace, Menlo, Consolas, monospace; padding: 1.5rem; background: #111; color: #ddd; }
  pre  { background: #1a1a1a; border: 1px solid #333; padding: 1rem; white-space: pre-wrap; }
  h1   { font-size: 1rem; color: #aaa; font-weight: 500; }
</style>
</head>
<body>
<h1>neoism-terminal-wasm scaffolding smoke</h1>
<pre id="out">loading wasm...</pre>

<script type="module">
  // wasm-pack build --target web emits ./pkg/neoism_terminal_wasm.js next to this file
  // (or wherever you copy the pkg/ output). Adjust the import path as needed.
  import init, { Terminal } from "./pkg/neoism_terminal_wasm.js";

  const out = document.getElementById("out");

  try {
    await init();

    const term = new Terminal(80, 24);
    // Feed a small ANSI sequence: green "Hello" with cursor advance.
    term.feed(new TextEncoder().encode("\x1b[1;32mHello, world!\x1b[0m\r\n\x07"));

    const pending = term.take_pty_writes();
    const effects = term.drain_effects_json();
    const snap = term.snapshot();

    const row0 = snap.viewport[0].map((cell) => cell.c).join("").replace(/\s+$/, "");
    out.textContent = [
      "row 0:    " + JSON.stringify(row0),
      "cursor:   col=" + snap.cursor.col + " row=" + snap.cursor.row,
      "effects:  " + JSON.stringify(effects),
      "pty out:  " + (pending.length ? new TextDecoder().decode(pending) : "(none)"),
      "title:    " + JSON.stringify(snap.title),
    ].join("\n");
  } catch (err) {
    out.textContent = "error: " + (err && err.stack ? err.stack : err);
  }
</script>
</body>
</html>
